<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Capacity — This Week & Next</title>
<style>
  :root {
    --cap-1: #d4334a;
    --cap-2: #e06830;
    --cap-3: #e89b3a;
    --cap-4: #3db8a0;
    --cap-5: #1aa88a;

    --cap-1-bg: rgba(212, 51, 74, 0.12);
    --cap-2-bg: rgba(224, 104, 48, 0.10);
    --cap-3-bg: rgba(232, 155, 58, 0.10);
    --cap-4-bg: rgba(61, 184, 160, 0.10);
    --cap-5-bg: rgba(26, 168, 138, 0.12);

    --bg: transparent;
    --surface: #ffffff;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --border: rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    min-width: 320px;
  }

  .week-section { margin-bottom: 20px; }

  .week-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: background 0.15s ease;
    min-height: 160px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 10px;
    pointer-events: none;
  }

  .card[data-cap="1"]::before { background: var(--cap-1-bg); }
  .card[data-cap="2"]::before { background: var(--cap-2-bg); }
  .card[data-cap="3"]::before { background: var(--cap-3-bg); }
  .card[data-cap="4"]::before { background: var(--cap-4-bg); }
  .card[data-cap="5"]::before { background: var(--cap-5-bg); }

  .card[data-cap="1"] { border-color: rgba(212, 51, 74, 0.25); }
  .card[data-cap="2"] { border-color: rgba(224, 104, 48, 0.25); }
  .card[data-cap="3"] { border-color: rgba(232, 155, 58, 0.25); }
  .card[data-cap="4"] { border-color: rgba(61, 184, 160, 0.25); }
  .card[data-cap="5"] { border-color: rgba(26, 168, 138, 0.25); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }

  .day-info { display: flex; flex-direction: column; }

  .day-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .day-date {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .cap-badge {
    font-size: 12px;
    font-weight: 800;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }

  .card[data-cap="1"] .cap-badge { background: var(--cap-1); color: #fff; }
  .card[data-cap="2"] .cap-badge { background: var(--cap-2); color: #fff; }
  .card[data-cap="3"] .cap-badge { background: var(--cap-3); color: #fff; }
  .card[data-cap="4"] .cap-badge { background: var(--cap-4); color: #fff; }
  .card[data-cap="5"] .cap-badge { background: var(--cap-5); color: #fff; }

  .focus-blocks {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .focus-block { display: flex; align-items: flex-start; gap: 6px; }

  .focus-label {
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    min-width: 18px;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .focus-text {
    font-size: 11px;
    line-height: 1.35;
    color: var(--text);
  }

  .commitments {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    position: relative;
    z-index: 1;
    margin-top: auto;
  }

  .tag {
    font-size: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(0,0,0,0.06);
    color: var(--text-muted);
  }

  .card.empty {
    opacity: 0.3;
    min-height: 120px;
  }

  .card.empty .day-name { color: var(--text-muted); }

  .empty-label {
    font-size: 10px;
    color: var(--text-muted);
    font-style: italic;
    position: relative;
    z-index: 1;
  }

  .generated-at {
    font-size: 9px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 8px;
    letter-spacing: 0.3px;
  }

  /* Dark mode via system preference */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --cap-1-bg: rgba(212, 51, 74, 0.35);
      --cap-2-bg: rgba(224, 104, 48, 0.30);
      --cap-3-bg: rgba(232, 155, 58, 0.28);
      --cap-4-bg: rgba(61, 184, 160, 0.28);
      --cap-5-bg: rgba(26, 168, 138, 0.32);
      --surface: #16213e;
      --text: #e0e0e0;
      --text-muted: #8892a4;
      --border: rgba(255,255,255,0.06);
    }
    :root:not([data-theme="light"]) .card[data-cap="1"] { border-color: rgba(212, 51, 74, 0.3); }
    :root:not([data-theme="light"]) .card[data-cap="2"] { border-color: rgba(224, 104, 48, 0.3); }
    :root:not([data-theme="light"]) .card[data-cap="3"] { border-color: rgba(232, 155, 58, 0.3); }
    :root:not([data-theme="light"]) .card[data-cap="4"] { border-color: rgba(61, 184, 160, 0.3); }
    :root:not([data-theme="light"]) .card[data-cap="5"] { border-color: rgba(26, 168, 138, 0.3); }
    :root:not([data-theme="light"]) .tag { background: rgba(255,255,255,0.07); }
  }

  /* Force dark via URL param ?theme=dark */
  :root[data-theme="dark"] {
    --cap-1-bg: rgba(212, 51, 74, 0.35);
    --cap-2-bg: rgba(224, 104, 48, 0.30);
    --cap-3-bg: rgba(232, 155, 58, 0.28);
    --cap-4-bg: rgba(61, 184, 160, 0.28);
    --cap-5-bg: rgba(26, 168, 138, 0.32);
    --surface: #16213e;
    --text: #e0e0e0;
    --text-muted: #8892a4;
    --border: rgba(255,255,255,0.06);
  }
  :root[data-theme="dark"] .card[data-cap="1"] { border-color: rgba(212, 51, 74, 0.3); }
  :root[data-theme="dark"] .card[data-cap="2"] { border-color: rgba(224, 104, 48, 0.3); }
  :root[data-theme="dark"] .card[data-cap="3"] { border-color: rgba(232, 155, 58, 0.3); }
  :root[data-theme="dark"] .card[data-cap="4"] { border-color: rgba(61, 184, 160, 0.3); }
  :root[data-theme="dark"] .card[data-cap="5"] { border-color: rgba(26, 168, 138, 0.3); }
  :root[data-theme="dark"] .tag { background: rgba(255,255,255,0.07); }

  @media (max-width: 600px) {
    .week-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 400px) {
    .week-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<script>
// ── DATA BLOCK ─────────────────────────────────────────────
// Nexus replaces this entire block each refresh cycle.
// 10 entries: 2 weeks x 5 weekdays. cap = 1-5 or null.
const CAPACITY_DATA = [
  {

    "am": "Gravity Admin",

    "commitments": [
      "1:1"
    ],

  },
  {

      "Team Sync"
    ],

      "Team Sync"
    ],

  },
  {

  },
  {

    "am": "",

  },
  {
    "day": "Wednesday",

    "am": "",

    "cap": null
  },
  {
    "day": "Thursday",
    "date": "2026-03-26",

  },
  {

    "am": "",

    "commitments": [],
    "cap": null
  }
];
const GENERATED_AT = "Mar 13, 2026 at 11:17 AM CT";
// ── END DATA BLOCK ─────────────────────────────────────────

function formatDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[d.getMonth()] + ' ' + d.getDate();
}

function weekRange(start, end) {
  const s = new Date(start + 'T12:00:00');
  const e = new Date(end + 'T12:00:00');
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (s.getMonth() === e.getMonth()) return m[s.getMonth()] + ' ' + s.getDate() + ' – ' + e.getDate();
  return m[s.getMonth()] + ' ' + s.getDate() + ' – ' + m[e.getMonth()] + ' ' + e.getDate();
}

function card(d) {
  const cap = d.cap || 0;
  const empty = !d.am && !d.pm && !cap;
  let h = '<div class="' + (empty ? 'card empty' : 'card') + '"' + (cap ? ' data-cap="' + cap + '"' : '') + '>';
  h += '<div class="card-header"><div class="day-info">';
  h += '<span class="day-name">' + d.day + '</span>';
  h += '<span class="day-date">' + formatDate(d.date) + '</span>';
  h += '</div>';
  if (cap) h += '<span class="cap-badge">' + cap + '</span>';
  h += '</div>';
  if (empty) {
    h += '<span class="empty-label">Not yet planned</span>';
  } else {
    h += '<div class="focus-blocks">';
    h += '<div class="focus-block"><span class="focus-label">AM</span><span class="focus-text">' + (d.am || '\u2014') + '</span></div>';
    h += '<div class="focus-block"><span class="focus-label">PM</span><span class="focus-text">' + (d.pm || '\u2014') + '</span></div>';
    h += '</div>';
    if (d.commitments && d.commitments.length) {
      h += '<div class="commitments">';
      d.commitments.forEach(function(c) { h += '<span class="tag">' + c + '</span>'; });
      h += '</div>';
    }
  }
  h += '</div>';
  return h;
}

// ── Theme: respect URL param, then system pref, default light ──
(function applyTheme() {
  var params = new URLSearchParams(window.location.search);
  var forced = params.get('theme');
  if (forced === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else if (forced === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
  // If no param, CSS media query handles it naturally
})();

(function render() {
  var w1 = CAPACITY_DATA.slice(0, 5);
  var w2 = CAPACITY_DATA.slice(5, 10);
  var o = '';

  o += '<div class="week-section">';
  o += '<div class="week-label">This Week \u2014 ' + weekRange(w1[0].date, w1[4].date) + '</div>';
  o += '<div class="week-grid">';
  w1.forEach(function(d) { o += card(d); });
  o += '</div></div>';

  o += '<div class="week-section">';
  o += '<div class="week-label">Next Week \u2014 ' + weekRange(w2[0].date, w2[4].date) + '</div>';
  o += '<div class="week-grid">';
  w2.forEach(function(d) { o += card(d); });
  o += '</div></div>';

  o += '<div class="generated-at">Last updated: ' + GENERATED_AT + '</div>';

  document.body.innerHTML = o;
})();
</script>
